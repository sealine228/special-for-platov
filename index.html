<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 23 февраля!</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(135deg, #2e3a87, #74b9ff);
  font-family: Arial, sans-serif;
  color: white;
  height: 100vh;
  position: relative;
}

.card {
  position: relative;
  z-index: 2;
  background: rgba(255,255,255,0.1);
  padding: 40px;
  border-radius: 20px;
  width: 90%;
  max-width: 500px;
  text-align: center;
  margin: 100px auto;
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
  animation: fadeIn 1.5s ease forwards;
  transition: all 0.6s ease;
}

.card.merc { animation: glowCard 2s infinite alternate; }

@keyframes glowCard {
  from { box-shadow: 0 0 40px rgba(255,215,0,0.5); }
  to { box-shadow: 0 0 70px rgba(255,215,0,0.8); }
}

h1 { font-size: 32px; }

.main-text {
  font-size: 18px;
  line-height: 1.6;
  margin-top: 15px;
}

button {
  margin-top: 25px;
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 30px;
  background: #ffd700;
  cursor: pointer;
  transition: 0.3s;
}

button:hover { 
  background: #ffe066; 
  transform: scale(1.05);
}

.congrats {
  display: none;
  font-size: 24px;
  font-weight: bold;
  color: #ffeb3b;
  margin-top: 20px;
  animation: fadeLine 1s forwards, glow 2s infinite alternate;
  text-shadow: 0 0 5px #ffeb3b, 0 0 15px #ffd700;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #ffeb3b, 0 0 15px #ffd700; }
  to { text-shadow: 0 0 10px #ffeb3b, 0 0 25px #ffd700; }
}

.case-text {
  display: none;
  margin-top: 20px;
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 20px;
  max-width: 450px;
  margin-left: auto;
  margin-right: auto;
  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.7s ease, box-shadow 0.3s ease;
}

.case-text.open {
  transform: scaleY(1);
}

.case-text:hover {
  box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
  transition: box-shadow 0.3s ease;
}

.divider {
  height: 1px;
  width: 60%;
  margin: 20px auto;
  background: rgba(255,255,255,0.3);
}

.line {
  opacity: 0;
  font-size: 18px;
  margin: 12px 0;
  transform: translateY(-20px);
}

.line.show {
  animation: slideIn 0.8s forwards;
}

.verdict { color: #ffd700; font-weight: bold; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }

.star {
  position: absolute;
  border-radius: 50%;
  opacity: 0.8;
  animation: fall linear infinite, twinkle 2s infinite alternate;
  box-shadow: 0 0 3px rgba(255,255,255,0.8);
}

@keyframes fall { from { transform: translateY(-10px); } to { transform: translateY(110vh); } }
@keyframes twinkle { from { opacity:0.3; } to { opacity:1; } }

.document-btn {
  display: none;
  margin-top: 15px;
  font-size: 16px;
  cursor: pointer;
  color: #ffd700;
  font-weight: bold;
  text-decoration: underline;
  transition: 0.3s;
}
.document-btn:hover { color:#fff176; text-shadow:0 0 8px #ffd700; }

.joke { display:none; font-size:16px; margin-top:15px; color:#fff176; font-style:italic; animation:fadeLine 1s forwards; }

.confetti {
  position: absolute;
  width: 8px; height:8px;
  border-radius:50%;
  top:-10px;
  animation: confettiFall linear infinite;
}
@keyframes confettiFall { to { transform: translateY(110vh) rotate(360deg); } }
</style>
</head>
<body>

<div class="card" id="card">
  <h1>С 23 февраля!</h1>

  <div class="main-text">
    Алтыным ❤️ <br>
    Желаю здоровья, счастья, стальных нервов, финансовой стабильности и процветания
  </div>

  <button id="btnCongrats" onclick="showCongrats()">Нажми</button>

  <div class="congrats" id="congrats">С Днём защитника Отечества!</div>

  <div class="document-btn" id="docBtn" onclick="openCase()">📄 Открыть дело</div>

  <div id="caseText" class="case-text">
    <div class="divider"></div>
    <p class="line">Примечания следователя:</p>
    <p class="line">подозреваемый очарователен,</p>
    <p class="line verdict">обжалованию не подлежит</p>
  </div>

  <div class="joke" id="joke">Шучу, хотела поднять настроение 😏</div>
</div>

<script>
function showCongrats(){
  document.getElementById("btnCongrats").style.display="none";
  document.getElementById("congrats").style.display="block";
  document.getElementById("card").classList.add("merc");
  setTimeout(()=>{ document.getElementById("docBtn").style.display="inline-block"; },1500);
  createConfetti(50);
}

function openCase(){
  const caseBlock=document.getElementById("caseText");
  caseBlock.style.display="block";
  setTimeout(()=>{ caseBlock.classList.add("open"); },50);

  // Построчное появление текста как выдвижение
  const lines=caseBlock.querySelectorAll('.line');
  lines.forEach((line,i)=>{ setTimeout(()=>{ line.classList.add('show'); }, i*600); });

  setTimeout(()=>{ document.getElementById("joke").style.display="block"; }, lines.length*600+500);
}

function createConfetti(count){
  for(let i=0;i<count;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*window.innerWidth+"px";
    c.style.width=c.style.height=(5+Math.random()*5)+"px";
    c.style.backgroundColor=["#ffd700","#ff6b6b","#6bc5ff","#ff9f43","#a29bfe"][Math.floor(Math.random()*5)];
    c.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(c);
    setTimeout(()=>{ c.remove(); },6000);
  }
}

// Звёзды
const colors=["#ffffff","#ffd700","#74b9ff","#a29bfe","#ffe066"];
for(let i=0;i<150;i++){
  let star=document.createElement("div");
  star.className="star";
  star.style.left=Math.random()*window.innerWidth+"px";
  star.style.width=star.style.height=(1+Math.random()*3)+"px";
  star.style.background=colors[Math.floor(Math.random()*colors.length)];
  star.style.animationDuration=(3 + Math.random()*5)+"s";
  star.style.opacity=0.3 + Math.random()*0.7;
  document.body.appendChild(star);
}
</script>
</body>
</html>
