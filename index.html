<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 23 февраля!</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(135deg, #1f2a1f, #3a4a2f);
  font-family: Arial, sans-serif;
  color: white;
}

/* Карточка */
.card {
  position: relative;
  z-index: 2;
  background: rgba(0,0,0,0.75);
  padding: 40px;
  border-radius: 20px;
  width: 90%;
  max-width: 500px;
  text-align: center;
  margin: 100px auto;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
  animation: fadeIn 1.5s ease forwards;
  transition: all 0.6s ease;
}

.card.opened {
  background: rgba(0,0,0,0.88);
  box-shadow: 0 0 60px rgba(197,161,0,0.4);
  transform: scale(1.03);
}

h1 { font-size: 32px; }

.main-text {
  font-size: 18px;
  line-height: 1.6;
  margin-top: 15px;
}

button {
  margin-top: 25px;
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 30px;
  background: #c5a100;
  cursor: pointer;
  transition: 0.3s;
}

button:hover { 
  background: #ffd700; 
  transform: scale(1.05);
}

/* Блок дела */
.case-text {
  display: none;
  margin-top: 30px;
}

.divider {
  height: 1px;
  width: 60%;
  margin: 20px auto;
  background: rgba(255,255,255,0.3);
}

.line {
  opacity: 0;
  font-size: 18px;
  margin: 12px 0;
}

.verdict {
  margin-top: 20px;
  font-size: 20px;
  color: #c5a100;
  font-weight: bold;
}

/* Появление строк */
.show .line:nth-child(2) { animation: fadeLine 1s forwards 0.5s; }
.show .line:nth-child(3) { animation: fadeLine 1s forwards 2s; }
.show .line:nth-child(4) { animation: fadeLine 1s forwards 3.5s; }
.show .line:nth-child(5) { animation: fadeLine 1s forwards 5s; }

@keyframes fadeLine {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Звёзды */
.star {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-10px); }
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div class="card">
  <h1>С 23 февраля!</h1>
  
  <div class="main-text">
    Алтыным ❤️ <br><br>
    Желаю стальных нервов, бетонного здоровья,
    финансовой стабильности и процветания 💪❤️
  </div>

  <button onclick="openCase(this)">
    Нажми
  </button>

  <div id="caseText" class="case-text">
    <div class="divider"></div>
    <p class="line">Возбуждено дело</p>
    <p class="line">по факту кражи моего интереса.</p>
    <p class="line">Подозреваемый установлен.</p>
    <p class="line verdict">Приговор обжалованию не подлежит.</p>
  </div>
</div>

<script>
function openCase(btn) {
  btn.style.display = "none";

  const card = document.querySelector(".card");
  card.classList.add("opened");

  let caseBlock = document.getElementById("caseText");
  caseBlock.style.display = "block";
  caseBlock.classList.add("show");
}

// падающие звёзды
for (let i = 0; i < 80; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random() * window.innerWidth + "px";
  star.style.animationDuration = (2 + Math.random() * 3) + "s";
  document.body.appendChild(star);
}
</script>

</body>
</html>
